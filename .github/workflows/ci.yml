name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm test
      - run: npm run lint

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version and cache name
        run: |
          HASH=$(cat index.html css/styles.css js/app.js js/checklist-data.js js/cloud.js manifest.json | sha256sum | cut -c1-8)
          sed -i "s/const CACHE_NAME = .*/const CACHE_NAME = 'rv-inspect-${HASH}';/" service-worker.js
          SHORT_SHA=$(git rev-parse --short HEAD)
          PKG_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/const APP_VERSION = .*/const APP_VERSION = '${PKG_VERSION} (${SHORT_SHA})';/" js/app.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
